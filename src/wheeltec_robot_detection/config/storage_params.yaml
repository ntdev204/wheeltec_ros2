# Image Storage Configuration
storage:
  # Storage paths
  base_path: "/home/jetson/wheeltec_data/images"
  raw_subdir: "raw"
  annotated_subdir: "annotated"

  # Storage limits
  max_images: 2000           # Total limit (1000 raw + 1000 annotated)
  max_raw_images: 1000
  max_annotated_images: 1000

  # Storage policy
  policy: "fifo"             # First In First Out
  save_only_with_objects: true  # Only save images with detected objects
  min_objects: 1             # Minimum number of objects to trigger save

  # Image format
  format: "jpg"
  quality: 85                # JPEG quality (1-100)

  # Metadata database
  db_path: "/home/jetson/wheeltec_data/images/metadata.db"

  # Topics
  topics:
    camera_input: "/camera/color/image_raw"
    detections_input: "/detections"
