# Video Streaming Configuration
streaming:
  # ZMQ publishing ports (SCADA server connects to these)
  ai_detection_port: 5558    # Detection annotated frames
  human_tracking_port: 5559  # Tracking annotated frames

  # Encoding
  format: "jpg"
  quality: 50                # Lower quality = smaller frame = faster over Tailscale VPN

  # Frame rate
  target_fps: 15             # Realistic target over VPN (Tailscale adds ~20ms RTT)

  # Annotation settings
  bbox_thickness: 2
  font_scale: 0.5
  font_thickness: 1

  # Colors (BGR format)
  colors:
    person: [0, 255, 0]      # Green for humans
    vehicle: [255, 0, 0]     # Blue for vehicles
    default: [0, 255, 255]   # Yellow for others

  # Topics
  topics:
    camera_input: "/ai/preview"
    detections_input: "/detections"
    tracked_humans_input: "/tracked_humans"
