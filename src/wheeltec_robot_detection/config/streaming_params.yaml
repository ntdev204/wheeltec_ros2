# Video Streaming Configuration
streaming:
  # WebSocket server
  port: 8000                 # HTTP/WebSocket server port

  # Encoding
  format: "jpg"
  quality: 70                # JPEG quality (1-100) - reduced for better FPS

  # Frame rate
  target_fps: 30             # Target streaming FPS

  # Annotation settings
  bbox_thickness: 2
  font_scale: 0.5
  font_thickness: 1

  # Colors (BGR format)
  colors:
    person: [0, 255, 0]      # Green for humans
    vehicle: [255, 0, 0]     # Blue for vehicles
    default: [0, 255, 255]   # Yellow for others

  # Topics
  topics:
    camera_input: "/ai/preview"
    detections_input: "/detections"
    tracked_humans_input: "/tracked_humans"
