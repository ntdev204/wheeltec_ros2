amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.5
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.4
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom_combined"
    pf_err: 0.02
    pf_z: 0.85
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 2
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.02
    tf_broadcast: true
    transform_tolerance: 0.3
    update_min_a: 0.06
    update_min_d: 0.025
    z_hit: 0.7
    z_max: 0.001
    z_rand: 0.059
    z_short: 0.24
    scan_topic: scan
    set_initial_pose: True
    initial_pose.x: 0.0
    initial_pose.y: 0.0
    initial_pose.z: 0.0
    initial_pose.yaw: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    transform_tolerance: 0.1
    goal_reached_tol: 0.25
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom_combined
    bt_loop_duration: 10
    default_server_timeout: 20
    # Giá trị này sẽ được override bởi navigation_launch.py (param_substitutions)
    # → resolve full path tự động trên mọi máy (RPi4/laptop)
    default_nav_to_pose_bt_xml: "REPLACED_BY_LAUNCH"
    error_code_names:
    - compute_path_error_code
    - follow_path_error_code

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    odom_topic: /odom_combined
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      # RotationShimController: xoay heading trước khi di chuyển
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller/RegulatedPurePursuitController"
      angular_dist_threshold: 0.785   # 45° — chỉ xoay khi lệch lớn
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.0
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: true

      # ─── Regulated Pure Pursuit Controller ───
      # Geometric path follower: chọn 1 lookahead point trên path → lái về phía đó
      # Rất nhẹ CPU, cực kỳ ổn định, không dao động

      # Lookahead: khoảng cách nhìn trước trên path
      # Xa hơn = mượt hơn nhưng cắt cua | Gần hơn = bám path chặt nhưng giật
      desired_linear_vel: 0.4         # m/s — tốc độ mong muốn
      lookahead_dist: 0.6             # m — lookahead cố định
      min_lookahead_dist: 0.3         # m — lookahead tối thiểu (khi chậm)
      max_lookahead_dist: 0.9         # m — lookahead tối đa (khi nhanh)
      lookahead_time: 1.5             # s — lookahead = speed × time (nếu > min/max thì clamp)

      # Approach velocity scaling: giảm tốc khi gần goal
      use_velocity_scaled_lookahead_dist: true   # Lookahead tỉ lệ tốc độ
      min_approach_linear_velocity: 0.05          # m/s — tốc độ tối thiểu gần goal
      approach_velocity_scaling_dist: 0.6         # m — bắt đầu giảm tốc cách goal

      # Regulated: giảm tốc gần vật cản và khi cua gấp
      use_regulated_linear_velocity_scaling: true  # Giảm tốc gần obstacle
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9    # m — bán kính cua nhỏ nhất trước khi giảm tốc
      regulated_linear_scaling_min_speed: 0.1     # m/s — tốc độ tối thiểu khi cua gấp

      # Velocity limits
      max_angular_accel: 2.0          # rad/s^2
      min_turning_radius: 0.0         # 0 = cho phép xoay tại chỗ (differential)

      # Path following
      transform_tolerance: 0.1
      use_rotate_to_heading: true     # Xoay tại chỗ nếu heading lệch quá nhiều
      rotate_to_heading_min_angle: 0.785          # 45° — threshold xoay tại chỗ
      rotate_to_heading_angular_vel: 1.0          # rad/s
      max_robot_pose_search_dist: 10.0            # m — tìm vị trí gần nhất trên path
      use_interpolation: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom_combined
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[ [-0.1350, -0.1110], [-0.1350, 0.1110], [0.1350, 0.1110], [0.1350, -0.1110] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # inflation_radius: phủ diagonal footprint (0.175m) + safety margin 0.07m = 0.245 → 0.25m
        # Đủ để MPPI biết vùng nguy hiểm, không quá lớn làm block hành lang
        cost_scaling_factor: 4.0     # Decay vừa phải — vùng cost cao không quá hẹp
        inflation_radius: 0.25
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      footprint: "[ [-0.1350, -0.1110], [-0.1350, 0.1110], [0.1350, 0.1110], [0.1350, -0.1110] ]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Global: inflation lớn hơn local để planner tạo path đi giữa hành lang
        # cost_scaling_factor cao → cost giảm nhanh → path bị đẩy ra trung tâm mạnh hơn
        cost_scaling_factor: 7.0
        inflation_radius: 0.28       # Đủ để path global tránh xa góc tường
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "WHEELTEC.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    # 1.0Hz đủ vì BT chỉ gọi planner khi path bị chặn
    expected_planner_frequency: 1.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true           # A* nhanh hơn Dijkstra, đủ tốt cho indoor
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 0.1
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom_combined
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
