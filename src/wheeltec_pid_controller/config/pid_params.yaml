# Velocity Smoother — NO PID, NO odom feedback
# Pure signal processing: low-pass → lateral suppress → rate limit
# Tunable at runtime: ros2 param set /pid_controller <param> <value>

pid_controller:
  ros__parameters:
    # ─── Control Loop ───
    control_frequency: 50.0  # Hz — output smoothing rate
    cmd_timeout: 0.5         # seconds — stop if no cmd_vel_raw

    # ─── Low-Pass Filter ───
    # Filters MPPI cmd_vel_raw to remove jitter
    # 0.2 = very smooth (slow response)
    # 0.5 = moderate
    # 1.0 = no filtering (raw passthrough)
    lowpass_alpha: 0.35

    # ─── Lateral Suppression ───
    # MPPI Omni samples small vy as noise → kill below threshold
    vy_suppress_threshold: 0.03   # m/s

    # ─── Velocity Limits ───
    max_vx: 0.5       # m/s
    max_vy: 0.20      # m/s — limit lateral speed
    max_wz: 1.5       # rad/s

    # ─── Acceleration Limits (rate limiter) ───
    # Primary smoothing mechanism — limits velocity change rate
    # Lower = smoother but slower response
    max_ax: 0.8        # m/s^2 — forward/backward
    max_ay: 0.3        # m/s^2 — lateral (very slow)
    max_awz: 0.8       # rad/s^2 — rotational

    # ─── Deadband per axis ───
    vx_deadband: 0.005  # m/s — ignore tiny vx
    vy_deadband: 0.02   # m/s — ignore tiny vy
    wz_deadband: 0.02   # rad/s — ignore tiny wz

    # ─── Enable/Disable ───
    # false = passthrough (for A/B testing)
    enabled: true
